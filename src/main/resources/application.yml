spring:
  application:
    name: pi-ai-code-mother
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pi_ai_code_mother
    username: root
    password: <Your Password>
  profiles:
    active: local

  # redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600  #redis的过期时间

  # session 配置,存入redis
  session:
    store-type: redis  #保存session到redis，默认是内存
    # session 30 天过期
    timeout: 2592000

server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000

# AI
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: <Your API>
      model-name: deepseek-chat
      log-requests: true
      log-responses: true
      max-tokens: 8192
#      strict-json-schema: true    #严格返回json格式
#      response-format: json_object

    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: <Your API>
      model-name: deepseek-chat
      max-tokens: 8192
      log-requests: true
      log-responses: true


# springdoc-openapi项目配置,访问http://localhost:8123/api/doc.html
springdoc:
  #  swagger-ui和  api-docs默认路径
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
# 组配置列表
  group-configs:
    # 默认组配置
    - group: 'default'
      paths-to-match: '/**'  # 需要匹配的路径，使用通配符/**表示所有路径
      packages-to-scan: com.ppp.piaicodemother.controller  # 需要扫描的包路径，用于扫描相关的组件
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn

# 添加 COS 对象存储配置（需要从腾讯云获取）
cos:
  client:
    host: your-custom-domain.com  #完整路径
    secretId: your-secret-id
    secretKey: your-secret-key
    region: ap-shanghai
    bucket: your-bucket-name

# Pexels 图片搜索配置
pexels:
  api-key: <Your API Key>
